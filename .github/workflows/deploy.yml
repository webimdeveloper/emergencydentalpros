name: Deploy Plugin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Setup SSH key
        env:
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -n "${{ secrets.KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${SSH_PORT}" "${SSH_HOST}" >> ~/.ssh/known_hosts
          fi

      - name: Deploy with rsync
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_PLUGIN_PATH: /var/www/dev.widev.pro/public_html/wp-content/plugins/emergencydentalpros/
        run: |
          rsync -avz --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude "src/" \
            --include "admin/docs/*.md" \
            --exclude "*.md" \
            -e "ssh -p ${SSH_PORT}" \
            ./ "${SSH_USER}@${SSH_HOST}:${REMOTE_PLUGIN_PATH}"

      - name: Invalidate OPcache
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_PLUGIN_PATH: /var/www/dev.widev.pro/public_html/wp-content/plugins/emergencydentalpros/
        run: |
          TOKEN=$(openssl rand -hex 12)
          REMOTE_FILE="${REMOTE_PLUGIN_PATH}edp-opc-${TOKEN}.php"
          WEB_URL="https://dev.widev.pro/wp-content/plugins/emergencydentalpros/edp-opc-${TOKEN}.php"
          ssh -p "${SSH_PORT}" -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            "printf '<?php opcache_reset(); echo \"ok\";' > ${REMOTE_FILE}"
          curl -sf --max-time 10 "${WEB_URL}" && echo "OPcache reset via HTTP" || echo "OPcache reset skipped (not enabled)"
          ssh -p "${SSH_PORT}" -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            "rm -f ${REMOTE_FILE}"
